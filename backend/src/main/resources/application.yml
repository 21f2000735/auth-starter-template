spring:
  application:
    name: openclaw-gmail-backend
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - openid
              - profile
              - email

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080

feature:
  sample-dashboard: true
  background-jobs: false
